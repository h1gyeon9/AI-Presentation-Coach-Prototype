<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 코칭 서비스 선택</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="home-shell">
      <section class="intro" aria-labelledby="page-title">
        <p class="eyebrow">AI Coaching Prototype</p>
        <h1 id="page-title">어떤 연습을 시작할까요?</h1>
        <p class="intro-desc">
          면접과 발표 페이지를 각각 독립적으로 개발할 수 있도록 첫 화면에서
          원하는 코칭 모드를 선택합니다.
        </p>
      </section>

      <section class="choice-grid" aria-label="코칭 모드 선택">
        <a class="choice-card interview" href="./interview.html">
          <span class="choice-icon" aria-hidden="true">Q</span>
          <span class="choice-kicker">Interview Coach</span>
          <strong>면접 연습</strong>
          <span class="choice-desc">
            예상 질문, 답변 구조, 시선과 자세 피드백을 중심으로 면접을 준비합니다.
          </span>
          <span class="choice-action">면접 페이지로 이동</span>
        </a>

        <a class="choice-card presentation" href="./presentation.html">
          <span class="choice-icon" aria-hidden="true">P</span>
          <span class="choice-kicker">Presentation Coach</span>
          <strong>발표 연습</strong>
          <span class="choice-desc">
            발표 흐름, 전달력, 제스처와 화면 집중도를 확인하며 발표를 다듬습니다.
          </span>
          <span class="choice-action">발표 페이지로 이동</span>
        </a>
      </section>
    </main>
  </body>
</html>
